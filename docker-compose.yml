services:
  app:
    build: .
    ports:
      - "455:455"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}:${HOME}
      - app-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=455
      - DATA_DIR=/app/data
    restart: unless-stopped

volumes:
  app-data:
